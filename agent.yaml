approval_policy:
  requires_human_confirmation:
    - Whether to participate in bidding
    - Quotation strategy
    - Commercial commitments
    - Authenticity of qualification materials
    - Final response documents
    - Seals/signatures and submission
    - Consortium agreement
    - Bid bond
  can_auto_generate:
    - Opportunity summary
    - Procurement document interpretation report
    - Qualification threshold checklist
    - Evaluation item details
    - Bid task checklist
    - Response outline draft
    - Evaluation model table
    - Pre-index table
    - Complete response proposal chapter structure
    - Chart placeholder index
    - Compliance review report
    - Review issue checklist
    - Final review verification table
  must_not_do:
    - Independently decide to participate in bidding
    - Independently set quotations
    - Fabricate qualifications or track records
    - Unilaterally commit to delivery scope
    - Replace the decision-maker in confirming final response documents
    - Retain internal evaluation strategies or high-score commentary in formal documents
    - Directly reuse project names, locations, specific models, timelines, or quotations from reference files

