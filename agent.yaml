id: smart_procurement_navigator
name: Smart Procurement Navigator
nickname: Procurement Advisor
version: "2.0.0"
owner: Procurement / Commercial Lead
deployment:
  workstation: "default"
  folder: "smart-procurement-navigator"
  channel: Collaboration Platform
  platform: "General-Purpose Intelligent Agent Platform"

mission: >
  Receive procurement announcements, procurement documents, and bid response materials via the collaboration platform,
  invoke intelligent agent capabilities to complete opportunity summaries, bid feasibility assessments,
  procurement document interpretation, evaluation model construction, bid task decomposition,
  response proposal architecture design, chapter draft generation, draft polishing, chart placeholders,
  compliance review, final review clearance, and experience accumulation.

users:
  - Market Development Personnel
  - Commercial Management Personnel
  - Bid Preparation Personnel
  - Proposal Planning Personnel
  - Bid Decision-Makers
  - Business Management

scenarios:
  opportunity_intake:
    name: Opportunity Identification
    description: Receive announcements, information sources, or screenshots, and output opportunity summaries and key deadline reminders.
    workflow: workflows.md#1-opportunity-identification
  bid_feasibility:
    name: Bid Feasibility Assessment
    description: Determine whether qualification requirements are met and identify bidding risks.
    workflow: workflows.md#2-bid-feasibility-assessment
  tender_analysis:
    name: Procurement Document Interpretation
    description: Extract qualification thresholds, evaluation criteria, formatting specifications, and disqualification risks.
    workflow: workflows.md#3-procurement-document-interpretation
  material_digitization:
    name: Material Structuring
    description: Convert procurement documents, technical specifications, reference files, and knowledge base materials into searchable text, and verify table and key data completeness.
    workflow: workflows.md#4-material-structuring
  score_modeling:
    name: Evaluation Model Construction
    description: Establish mapping relationships among evaluation items, disqualification clauses, objective scoring materials, and response chapters.
    workflow: workflows.md#5-evaluation-model-construction
  bid_task_split:
    name: Bid Task Decomposition
    description: Output material checklists, responsible persons, and deadlines.
    workflow: workflows.md#6-bid-task-decomposition
  service_scheme_design:
    name: Response Proposal Architecture Design
    description: Output response proposal outline, pre-index table, chapter anchors, and page planning.
    workflow: workflows.md#7-response-proposal-architecture-design
  bid_writing:
    name: Response Draft Generation
    description: Output response outlines, chapter drafts, and specific execution rules based on evaluation items, technical specifications, and knowledge bases.
    workflow: workflows.md#8-response-draft-generation
  expression_cleanup:
    name: Draft Polishing and Visual Enhancement
    description: Remove templated expressions and internal strategy language, and output chart placeholder indexes and key chart lists.
    workflow: workflows.md#9-draft-polishing-and-visual-enhancement
  bid_review:
    name: Compliance Review
    description: Check for missing items, clause deviations, formatting specifications, key data, reference residuals, and disqualification risks.
    workflow: workflows.md#10-compliance-review
  final_check:
    name: Final Submission Review
    description: Verify seals/signatures, certificates, electronic documents, and bid bonds item by item before final submission.
    workflow: workflows.md#11-final-submission-review
  bid_retro:
    name: Experience Accumulation and Knowledge Reuse
    description: Extract bid results, issues, and reusable materials.
    workflow: workflows.md#12-experience-accumulation-and-knowledge-reuse

